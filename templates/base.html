<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}InvestIQ — Sistem Pakar Profil Risiko{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="noise-overlay"></div>

    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-logo">
            <span class="logo-mark">I</span><span class="logo-text">nvestIQ</span>
        </a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="nav-link">Mulai Tes</a>
            <a href="{{ url_for('pakar') }}" class="nav-link nav-link--expert">
                <span class="expert-dot"></span> Panel Pakar
            </a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>InvestIQ &copy; 2024 — Sistem Pakar Penilaian Profil Risiko Investasi</p>
        <p class="footer-sub">Menggunakan Forward Chaining & Certainty Factor</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
